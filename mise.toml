[tools]
node       = "22"
uv         = "latest"
jq         = "latest"
rust       = { version = "nightly", profile = "minimal" }
shellcheck = "latest"
just       = "1.56.0"

[env]
# Change this — it isolates your cluster from others on the same network.
EXO_LIBP2P_NAMESPACE = "my-cluster"
EXO_API = "http://localhost:52415"

# Model tiers — change here, everything else follows.
# Verified against a live EXO instance's /models registry on 2026-07-19.
MODEL_FAST = "mlx-community/Qwen3-Coder-Next-4bit"
MODEL_TINY = "mlx-community/Qwen3.5-9B-4bit"
MODEL_BIG  = "mlx-community/gpt-oss-120b-MXFP4-Q8"

[tasks.info]
description = "Show resolved tool + env state"
run = """
echo "node: $(node --version)"
echo "uv:   $(uv --version)"
echo "jq:   $(jq --version)"
echo "rust: $(rustc --version)"
echo "ns:   $EXO_LIBP2P_NAMESPACE"
"""
